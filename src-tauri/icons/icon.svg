<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Rounded indigo background -->
  <rect width="512" height="512" rx="96" ry="96" fill="#4F46E5"/>

  <!-- Notepad page (slight tilt for character) -->
  <g transform="translate(256 264) rotate(-3)">
    <!-- Page body -->
    <rect x="-150" y="-180" width="300" height="360" rx="18" ry="18"
          fill="#F8FAFC" stroke="#1E293B" stroke-width="10"/>

    <!-- Left red margin line -->
    <line x1="-110" y1="-160" x2="-110" y2="160"
          stroke="#EF4444" stroke-width="4" stroke-linecap="round"/>

    <!-- Horizontal rule lines -->
    <g stroke="#94A3B8" stroke-width="6" stroke-linecap="round">
      <line x1="-90" y1="-110" x2="120" y2="-110"/>
      <line x1="-90" y1="-60"  x2="120" y2="-60"/>
      <line x1="-90" y1="-10"  x2="120" y2="-10"/>
      <line x1="-90" y1="40"   x2="120" y2="40"/>
      <line x1="-90" y1="90"   x2="80"  y2="90"/>
    </g>
  </g>

  <!-- Spiral binding holes (on top of the page) -->
  <g fill="#1E293B">
    <circle cx="142" cy="92"  r="14"/>
    <circle cx="208" cy="86"  r="14"/>
    <circle cx="274" cy="80"  r="14"/>
    <circle cx="340" cy="74"  r="14"/>
    <circle cx="406" cy="68"  r="14"/>
  </g>

  <!-- Wire loops connecting the holes upward -->
  <g fill="none" stroke="#0F172A" stroke-width="10" stroke-linecap="round">
    <path d="M142 92 q-6 -42 18 -52"/>
    <path d="M208 86 q-6 -42 18 -52"/>
    <path d="M274 80 q-6 -42 18 -52"/>
    <path d="M340 74 q-6 -42 18 -52"/>
    <path d="M406 68 q-6 -42 18 -52"/>
  </g>
</svg>
