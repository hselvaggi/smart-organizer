name: smart-organizer
base: core24
version: '0.1.0'
summary: Local-first task manager with rich-text notes
description: |
  A cross-platform desktop tool that organises projects, stories and tasks
  with markdown / LaTeX descriptions, comments, standalone notes and a
  drag-and-drop kanban board. Your data stays on your machine.

  An optional MCP server (off by default) lets local AI agents read or
  update your data on 127.0.0.1 only.

grade: stable
confinement: strict
license: Proprietary

platforms:
  amd64:

apps:
  smart-organizer:
    # The wrapper sets WebKit env vars before exec — the env: block in
    # snap.yaml silently drops WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS
    # (the launch chain scrubs anything with "DANGEROUS" in the name),
    # so we set it from a shell instead. See snap/local/launcher.sh.
    command: bin/launcher.sh
    extensions:
      - gnome
    plugs:
      - home
      - network
      - network-bind
      - removable-media
      - opengl

parts:
  smart-organizer:
    plugin: nil
    source: .
    build-snaps:
      - node/20/stable
      - rustup
    build-packages:
      - build-essential
      - curl
      - file
      - libayatana-appindicator3-dev
      - librsvg2-dev
      - libssl-dev
      - libwebkit2gtk-4.1-dev
      - libxdo-dev
      - pkg-config
      - wget
    stage-packages:
      - libayatana-appindicator3-1
      - libxdo3
      # libwebkit2gtk-4.1-0 and librsvg2-2 are intentionally NOT staged:
      # the gnome-46-2404 platform snap already provides both. Shipping
      # our own copies causes ABI mismatches — for webkit, the staged
      # lib and the platform's bind-mounted WebKitWebProcess helper
      # disagree on ABI and the WebView paints a blank gray window;
      # for librsvg, the platform's gdk-pixbuf SVG loader fails to find
      # `rsvg_handle_get_pixbuf_and_error`. Build-time headers come from
      # the libwebkit2gtk-4.1-dev / librsvg2-dev build-packages.
    override-build: |
      set -eux
      # Rust toolchain via the rustup snap
      rustup default stable

      # pnpm — install via npm under a writable prefix because the node
      # snap doesn't expose corepack
      mkdir -p "$HOME/.npm-global"
      npm config set prefix "$HOME/.npm-global"
      export PATH="$HOME/.npm-global/bin:$PATH"
      npm install -g pnpm@10

      # Build frontend + Tauri binary (no bundling — we install the bare
      # binary into the snap ourselves). CI=true so pnpm doesn't prompt
      # for a TTY when purging a stale node_modules from a prior build.
      export CI=true
      pnpm install --frozen-lockfile
      pnpm tauri build --no-bundle

      # Install the binary under the snap's bin/ dir, renamed to match the
      # snap app name, plus the wrapper script the app runs via.
      install -Dm755 src-tauri/target/release/tasks \
        "$CRAFT_PART_INSTALL/bin/smart-organizer"
      install -Dm755 "$CRAFT_PROJECT_DIR/snap/local/launcher.sh" \
        "$CRAFT_PART_INSTALL/bin/launcher.sh"
